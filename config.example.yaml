# Financial Wall Dashboard — Configuracion de ejemplo
# Copia este archivo a config.yaml y rellena los valores.
# IMPORTANTE: config.yaml esta en .gitignore — nunca commitear la API key real.

# ---------------------------------------------------------------------------
# Entorno de ejecucion
#   mockup  — sin llamadas a CoinMarketCap; precios inventados para desarrollo
#   test    — llamadas reales, pantalla en modo ventana (fullscreen: false)
#   pro     — produccion completa (Raspberry Pi, fullscreen, sin cursor)
#
# El entorno solo afecta a CoinMarketCap. Weather y Yahoo Finance
# siempre hacen llamadas reales (son servicios gratuitos sin API key).
# ---------------------------------------------------------------------------
environment: pro

# ---------------------------------------------------------------------------
# Pantalla
# ---------------------------------------------------------------------------
display:
  fullscreen: true       # true en Raspberry Pi / pro; false para desarrollo en PC
  hide_cursor: true      # true en produccion (sin raton); false en desarrollo
  # sim_resolution: 1024x600   # opcional — simula resolucion en modo ventana

# ---------------------------------------------------------------------------
# API Keys
# ---------------------------------------------------------------------------
api_keys:
  coinmarketcap: "TU_API_KEY_AQUI"
  # Plan gratuito de CoinMarketCap es suficiente (hasta 10.000 llamadas/mes).
  # Registro en: https://coinmarketcap.com/api/
  # No necesaria si environment: mockup

# ---------------------------------------------------------------------------
# Meteorologia
# ---------------------------------------------------------------------------
weather:
  city: "Barcelona"
  # Cualquier ciudad soportada por wttr.in. Ejemplos: Madrid, London, "New York"
  # Servicio gratuito, sin API key. https://wttr.in

# ---------------------------------------------------------------------------
# Bloques de grafico (filas 1 y 2 del dashboard, maximo 6)
#
# Cada bloque ocupa un slot con sparkline. Se muestran en orden, 3 por fila.
# Puedes configurarlos desde la webapp (scripts/app-config) o editando aqui.
#
# Campos:
#   label      — texto que aparece en el header del bloque
#   ticker     — simbolo de Yahoo Finance (BTC-USD, GC=F, ^GSPC, ^IBEX, ETH-USD...)
#   period     — periodo del historial: "7d" o "1mo"
#   cmc_symbol — simbolo en CoinMarketCap (solo para cryptos; null para el resto)
#   format     — tipo de formato del precio:
#                  crypto     → $67.234,12
#                  commodity  → $2.321,40 /oz
#                  index      → 5.102,45 pts
#                  index_int  → 11.234 pts  (IBEX, sin decimales)
# ---------------------------------------------------------------------------
chart_blocks:
  - label: "BTC"
    ticker: "BTC-USD"
    period: "7d"
    cmc_symbol: "BTC"
    format: "crypto"

  - label: "ETH"
    ticker: "ETH-USD"
    period: "7d"
    cmc_symbol: "ETH"
    format: "crypto"

  - label: "ORO"
    ticker: "GC=F"
    period: "1mo"
    cmc_symbol: null
    format: "commodity"

  - label: "S&P500"
    ticker: "^GSPC"
    period: "1mo"
    cmc_symbol: null
    format: "index"

  - label: "PLATA"
    ticker: "SI=F"
    period: "1mo"
    cmc_symbol: null
    format: "commodity"

  - label: "IBEX35"
    ticker: "^IBEX"
    period: "1mo"
    cmc_symbol: null
    format: "index_int"

# ---------------------------------------------------------------------------
# Altcoin Grid (rejilla inferior del dashboard)
#
# Cryptos que aparecen en la rejilla de 3 columnas debajo de los graficos.
# Solo pueden ser simbolos de CoinMarketCap.
# Los simbolos definidos en chart_blocks como cmc_symbol se excluyen automaticamente.
#
# Edita esta lista o usa la webapp para drag & drop.
# ---------------------------------------------------------------------------
cryptos:
  symbols:
    - SOL
    - DOT
    - POPCAT
    - WIF
    - ALI
    - AURA
    - JUP
    - STRK
    - GPU
    - RAIL
    - ROSE
    - HSUITE

# ---------------------------------------------------------------------------
# Intervalos de refresco en segundos
#
# Cada clave tiene un minimo propio; si se configura un valor menor,
# la aplicacion lo ignora y usa el minimo indicado:
#
#   cryptos  — CoinMarketCap API (precios + rank)     minimo: 300 s  (5 min)
#   charts   — Yahoo Finance sparklines BTC/ETH 7d    minimo: 300 s  (5 min)
#   market   — Yahoo Finance Oro, Plata, S&P, IBEX    minimo: 1800 s (30 min)
#   weather  — wttr.in temperatura y condicion        minimo: 1800 s (30 min)
# ---------------------------------------------------------------------------
refresh:
  cryptos: 300     #  5 min  — minimo permitido
  charts:  300     #  5 min  — minimo permitido
  market:  1800    # 30 min  — minimo permitido
  weather: 1800    # 30 min  — minimo permitido

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: "INFO"          # DEBUG | INFO | WARNING | ERROR
  file: "app.log"        # ruta relativa al directorio de trabajo (src/)
  max_bytes: 5242880     # 5 MB por fichero antes de rotar
  backup_count: 3        # numero de ficheros de backup rotados
