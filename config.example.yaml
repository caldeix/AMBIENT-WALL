# Crypto Wall Dashboard — Configuracion de ejemplo
# Copia este archivo a config.yaml y rellena los valores.
# IMPORTANTE: config.yaml esta en .gitignore — nunca commitear la API key real.

# ---------------------------------------------------------------------------
# Entorno: determina el comportamiento de los servicios de datos
#   mockup  — datos inventados para las APIs con API key (sin llamadas externas)
#   test    — llamadas reales, configuracion de desarrollo (fullscreen off, etc.)
#   pro     — produccion completa (Raspberry Pi, fullscreen, etc.)
# ---------------------------------------------------------------------------
environment: pro

# ---------------------------------------------------------------------------
# Pantalla
# ---------------------------------------------------------------------------
display:
  fullscreen: true      # true en Raspberry Pi para modo cuadro
  hide_cursor: true     # true en produccion (sin raton)

# ---------------------------------------------------------------------------
# API Keys
# ---------------------------------------------------------------------------
api_keys:
  coinmarketcap: "TU_API_KEY_AQUI"   # https://coinmarketcap.com/api/

# ---------------------------------------------------------------------------
# Cryptos a mostrar (se usan en el orden indicado)
#   - BTC y ETH siempre aparecen en los bloques superiores con grafica
#   - El resto se muestran en la rejilla de altcoins (3 columnas)
# ---------------------------------------------------------------------------
cryptos:
  symbols:
    - BTC
    - ETH
    - SOL
    - DOT
    - POPCAT
    - WIF
    - ALI
    - AURA
    - JUP
    - STRK
    - GPU
    - RAIL
    - ROSE
    - HSUITE

# ---------------------------------------------------------------------------
# Meteorologia (wttr.in, sin API key)
# ---------------------------------------------------------------------------
weather:
  city: "Barcelona"    # Cualquier ciudad soportada por wttr.in

# ---------------------------------------------------------------------------
# Intervalos de refresco en segundos (minimo permitido: 60s)
#   cryptos  -> CoinMarketCap API  (precios + rank de todas las cryptos)
#   charts   -> Yahoo Finance      (historial BTC/ETH 7d para sparkline)
#   market   -> Yahoo Finance      (Oro, Plata, S&P500, IBEX35, EUR/USD)
#   weather  -> wttr.in (ciudad configurada arriba)
# ---------------------------------------------------------------------------
refresh:
  cryptos: 300     #  5 min
  charts:  300     #  5 min
  market:  1800    # 30 min
  weather: 1800    # 30 min

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: "INFO"          # DEBUG | INFO | WARNING | ERROR
  file: "app.log"
  max_bytes: 5242880     # 5 MB
  backup_count: 3
