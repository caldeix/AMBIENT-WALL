<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Wall — Config</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
/* ── Reset & variables ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #0a0a1a;
  --bg-panel: #0f0f23;
  --bg-input: #141430;
  --border:   #1a1a2e;
  --border2:  #252550;
  --text:     #e0e0e0;
  --muted:    #8888aa;
  --accent:   #00d4ff;
  --pos:      #00ff88;
  --neg:      #ff4466;
  --warn:     #ffcc00;
  --radius:   6px;
  --font:     'Segoe UI', system-ui, sans-serif;
}
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── Header ────────────────────────────────────────────────── */
.header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px;
  background: var(--bg-panel); border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 16px; font-weight: 600; color: var(--accent); letter-spacing: 0.5px; }
.header-actions { display: flex; gap: 10px; align-items: center; }
#save-btn {
  background: var(--accent); color: #000; border: none;
  padding: 8px 20px; border-radius: var(--radius);
  font-weight: 700; cursor: pointer; font-size: 13px; transition: opacity .15s;
}
#save-btn:hover { opacity: .85; }
#save-btn:disabled { opacity: .4; cursor: default; }
#status-msg { font-size: 12px; color: var(--muted); }

/* ── Settings (arriba) ─────────────────────────────────────── */
.settings {
  background: var(--bg-panel); border-bottom: 1px solid var(--border);
  padding: 10px 20px 12px;
}
.settings-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px 16px; margin-top: 8px;
}

/* ── Main layout ───────────────────────────────────────────── */
.main {
  display: flex; gap: 12px; padding: 16px;
  flex: 1; overflow: hidden; min-height: 0;
}

/* ── Columns ───────────────────────────────────────────────── */
.col {
  display: flex; flex-direction: column; gap: 8px;
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px; overflow: hidden;
}
.col-available { flex: 1.2; min-width: 260px; }
.col-altcoins  { flex: 1;   min-width: 200px; }
.col-charts    { flex: 1;   min-width: 220px; }

.col-header {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  color: var(--accent); text-transform: uppercase; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.col-header .hint { font-weight: 400; color: var(--muted); text-transform: none; font-size: 11px; }
.col-sub { font-size: 11px; color: var(--muted); margin-bottom: 4px; }

/* ── Tabs ──────────────────────────────────────────────────── */
.tabs { display: flex; gap: 4px; }
.tab {
  flex: 1; padding: 5px 8px; border: 1px solid var(--border2);
  background: transparent; color: var(--muted); border-radius: var(--radius);
  cursor: pointer; font-size: 12px; transition: all .15s;
}
.tab.active { background: var(--border2); color: var(--text); border-color: var(--accent); }

/* ── Search ────────────────────────────────────────────────── */
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%; padding: 7px 10px 7px 30px;
  background: var(--bg-input); border: 1px solid var(--border2);
  border-radius: var(--radius); color: var(--text); font-size: 13px; outline: none;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap::before {
  content: '🔍'; position: absolute; left: 9px; top: 50%;
  transform: translateY(-50%); font-size: 12px; pointer-events: none;
}

/* ── Asset lists ───────────────────────────────────────────── */
.asset-list {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 3px;
}
.asset-list.hidden { display: none; }

/* ── Asset item ────────────────────────────────────────────── */
.asset-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: var(--radius);
  background: var(--bg); border: 1px solid var(--border);
  cursor: grab; user-select: none; transition: border-color .1s;
}
.asset-item:hover { border-color: var(--border2); }
.asset-item.sortable-ghost { opacity: .35; }
.asset-item.sortable-chosen { border-color: var(--accent); }
.asset-item .rank {
  font-size: 10px; color: var(--muted); width: 32px; text-align: right; flex-shrink: 0;
}
.asset-item .symbol {
  font-weight: 700; font-size: 13px; width: 52px; flex-shrink: 0; color: var(--accent);
}
.asset-item .name {
  font-size: 12px; color: var(--muted); flex: 1; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.asset-item .type-badge {
  font-size: 10px; padding: 1px 5px; border-radius: 3px;
  background: var(--border2); color: var(--muted); flex-shrink: 0;
}
.asset-item .remove-btn {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px;
  flex-shrink: 0; transition: color .1s;
}
.asset-item .remove-btn:hover { color: var(--neg); }

/* ── Sortable drop areas ───────────────────────────────────── */
.drop-area {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 3px;
  min-height: 60px; border: 1px dashed var(--border2); border-radius: var(--radius);
  padding: 6px; transition: border-color .15s;
}
.drop-area.drag-over { border-color: var(--accent); background: rgba(0,212,255,.03); }
.drop-area .empty-hint {
  text-align: center; color: var(--muted); font-size: 12px;
  padding: 20px 0; pointer-events: none;
}

/* ── Chart slots ───────────────────────────────────────────── */
.chart-slot {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; border-radius: var(--radius);
  background: var(--bg); border: 1px solid var(--border);
}
.chart-slot .slot-num {
  font-size: 10px; color: var(--muted); width: 16px; text-align: center; flex-shrink: 0;
}
.chart-slot .slot-symbol { font-weight: 700; font-size: 13px; color: var(--accent); width: 48px; }
.chart-slot .slot-label-input {
  flex: 1; background: var(--bg-input); border: 1px solid var(--border2);
  border-radius: 4px; color: var(--text); font-size: 12px;
  padding: 3px 6px; outline: none; min-width: 0;
}
.chart-slot .slot-label-input:focus { border-color: var(--accent); }
.chart-slot .period-select {
  background: var(--bg-input); border: 1px solid var(--border2);
  border-radius: 4px; color: var(--text); font-size: 11px;
  padding: 3px 4px; outline: none; cursor: pointer; flex-shrink: 0;
}
.chart-slot .slot-status { width: 16px; text-align: center; flex-shrink: 0; }
.chart-slot .slot-status.ok      { color: var(--pos); }
.chart-slot .slot-status.error   { color: var(--neg); }
.chart-slot .slot-status.loading { color: var(--warn); animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.chart-slot-empty {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 8px; border-radius: var(--radius);
  border: 1px dashed var(--border2); color: var(--muted); font-size: 12px;
}
.chart-slot-empty .slot-num { font-size: 10px; width: 16px; text-align: center; }

/* ── Pagination ────────────────────────────────────────────── */
.pagination {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding-top: 6px; font-size: 12px; color: var(--muted);
}
.pagination button {
  background: var(--bg-input); border: 1px solid var(--border2);
  color: var(--text); border-radius: 4px; padding: 3px 8px; cursor: pointer;
}
.pagination button:disabled { opacity: .3; cursor: default; }

/* ── Settings (eliminado de aquí, movido arriba del main) ───── */
.settings-title {
  font-size: 11px; font-weight: 700; color: var(--accent);
  letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px;
}
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11px; color: var(--muted); }
.field input, .field select {
  background: var(--bg-input); border: 1px solid var(--border2);
  border-radius: var(--radius); color: var(--text); font-size: 13px;
  padding: 6px 10px; outline: none;
}
.field input:focus, .field select:focus { border-color: var(--accent); }
.field .input-row { display: flex; gap: 6px; }
.field .input-row input { flex: 1; }
.field .detect-btn {
  background: var(--border2); border: 1px solid var(--border2);
  color: var(--text); border-radius: var(--radius);
  padding: 6px 10px; cursor: pointer; font-size: 12px; white-space: nowrap;
}
.field .detect-btn:hover { border-color: var(--accent); }
.key-wrap { position: relative; }
.key-wrap input { padding-right: 36px; }
.key-wrap .show-btn {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px;
}

/* ── Toast ─────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  padding: 10px 18px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500; opacity: 0; transition: opacity .3s;
  pointer-events: none;
}
#toast.show { opacity: 1; }
#toast.success { background: #0d2e1a; color: var(--pos); border: 1px solid var(--pos); }
#toast.error   { background: #2e0d15; color: var(--neg); border: 1px solid var(--neg); }
#toast.info    { background: #0d1a2e; color: var(--accent); border: 1px solid var(--accent); }

/* ── Scrollbar ─────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────── -->
<div class="header">
  <h1>⚡ Crypto Wall — Configuración</h1>
  <div class="header-actions">
    <span id="status-msg"></span>
    <button id="save-btn" onclick="saveConfig()">Guardar</button>
  </div>
</div>

<!-- ── Settings (arriba) ──────────────────────────────────── -->
<div class="settings">
  <div class="settings-title">Configuración general</div>
  <div class="settings-grid">

    <div class="field">
      <label>Entorno</label>
      <select id="s-env">
        <option value="mockup">mockup — sin llamadas API</option>
        <option value="test">test — llamadas reales, ventana</option>
        <option value="pro">pro — producción (fullscreen)</option>
      </select>
    </div>

    <div class="field">
      <label>API Key CoinMarketCap</label>
      <div class="key-wrap">
        <input id="s-apikey" type="password" placeholder="Tu API key">
        <button class="show-btn" onclick="toggleKey()">👁</button>
      </div>
    </div>

    <div class="field">
      <label>Ciudad (tiempo)</label>
      <div class="input-row">
        <input id="s-city" type="text" placeholder="Barcelona">
        <button class="detect-btn" onclick="detectCity()">📍 Detectar</button>
      </div>
    </div>

    <div class="field">
      <label>Cryptos — precios CMC (seg)</label>
      <input id="s-ref-cryptos" type="number" min="60" step="60">
    </div>

    <div class="field">
      <label>Gráficos BTC/ETH — Yahoo (seg)</label>
      <input id="s-ref-charts" type="number" min="60" step="60">
    </div>

    <div class="field">
      <label>Mercado — Oro, Plata, S&amp;P, IBEX (seg)</label>
      <input id="s-ref-market" type="number" min="60" step="300">
    </div>

    <div class="field">
      <label>Tiempo meteorológico — wttr.in (seg)</label>
      <input id="s-ref-weather" type="number" min="60" step="300">
    </div>

  </div>
</div>

<!-- ── 3 Columns ──────────────────────────────────────────── -->
<div class="main">

  <!-- Columna 1: Disponibles -->
  <div class="col col-available">
    <div class="col-header">Disponibles</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('cmc')">Cryptos (CMC)</button>
      <button class="tab" onclick="switchTab('yahoo')">Yahoo Finance</button>
    </div>
    <div class="search-wrap">
      <input id="search-input" type="search" placeholder="Buscar por nombre o símbolo..."
             oninput="onSearch(this.value)">
    </div>

    <!-- CMC list -->
    <div id="cmc-list" class="asset-list"></div>

    <!-- Yahoo list -->
    <div id="yahoo-list" class="asset-list hidden"></div>

    <div class="pagination">
      <button id="prev-btn" onclick="changePage(-1)" disabled>◀</button>
      <span id="page-info">—</span>
      <button id="next-btn" onclick="changePage(1)" disabled>▶</button>
    </div>
  </div>

  <!-- Columna 2: Altcoin Grid -->
  <div class="col col-altcoins">
    <div class="col-header">Altcoin Grid <span class="hint">(solo CMC)</span></div>
    <div class="col-sub">Arrastra desde la columna izquierda (solo cryptos CMC)</div>
    <div id="altcoin-drop" class="drop-area">
      <div class="empty-hint">Arrastra cryptos aquí</div>
    </div>
  </div>

  <!-- Columna 3: Chart Blocks -->
  <div class="col col-charts">
    <div class="col-header">Bloques Gráfico <span class="hint">(máx 6)</span></div>
    <div class="col-sub">Arrastra cualquier activo. Se valida el histórico al soltar.</div>
    <div id="chart-slots-wrap" style="display:flex;flex-direction:column;gap:4px;flex:1;overflow-y:auto;"></div>
  </div>

</div>

<!-- ── Toast ───────────────────────────────────────────────── -->
<div id="toast"></div>

<script>
// ================================================================
// Estado global
// ================================================================
const state = {
  config:      {},
  altcoins:    [],   // [{symbol, name, rank}]
  chartBlocks: [],   // [{label, ticker, period, cmc_symbol, format, _status}]
  activeTab:   'cmc',
  cmcPage:     1,
  cmcTotal:    0,
  cmcPages:    0,
  cmcQuery:    '',
  searchTimer: null,
};

// ================================================================
// Boot
// ================================================================
document.addEventListener('DOMContentLoaded', async () => {
  await loadConfig();
  await loadCmcPage();
  renderAltcoins();
  renderChartSlots();
  initSortables();
  attachAltNativeDrop();
});

// ================================================================
// Config
// ================================================================
async function loadConfig() {
  try {
    const cfg = await apiFetch('/api/config');
    state.config = cfg;
    state.altcoins    = (cfg.cryptos?.symbols || []).map(s => ({ symbol: s, name: s, rank: null }));
    state.chartBlocks = (cfg.chart_blocks || []).map(b => ({ ...b, _status: 'ok' }));
    populateSettings(cfg);
  } catch (e) {
    toast('Error al cargar config: ' + e.message, 'error');
  }
}

function populateSettings(cfg) {
  setVal('s-env',         cfg.environment || 'pro');
  setVal('s-apikey',      cfg.api_keys?.coinmarketcap || '');
  setVal('s-city',        cfg.weather?.city || '');
  setVal('s-ref-cryptos', cfg.refresh?.cryptos || 300);
  setVal('s-ref-charts',  cfg.refresh?.charts  || 300);
  setVal('s-ref-market',  cfg.refresh?.market  || 1800);
  setVal('s-ref-weather', cfg.refresh?.weather || 1800);
}

async function saveConfig() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  setStatus('Guardando...');

  const newConfig = {
    ...state.config,
    environment: getVal('s-env'),
    api_keys:    { coinmarketcap: getVal('s-apikey') },
    weather:     { city: getVal('s-city') },
    refresh: {
      cryptos: parseInt(getVal('s-ref-cryptos')) || 300,
      charts:  parseInt(getVal('s-ref-charts'))  || 300,
      market:  parseInt(getVal('s-ref-market'))  || 1800,
      weather: parseInt(getVal('s-ref-weather')) || 1800,
    },
    cryptos: {
      symbols: state.altcoins.map(a => a.symbol),
    },
    chart_blocks: state.chartBlocks.map(({ _status, ...b }) => b),
  };

  try {
    await apiFetch('/api/config', { method: 'POST', body: JSON.stringify(newConfig) });
    state.config = newConfig;
    toast('Config guardado ✓ — el dashboard actualizará en segundos', 'success');
    setStatus('Guardado ✓');
  } catch (e) {
    toast('Error al guardar: ' + e.message, 'error');
    setStatus('Error al guardar');
  } finally {
    btn.disabled = false;
  }
}

// ================================================================
// Tabs
// ================================================================
function switchTab(tab) {
  state.activeTab = tab;
  state.cmcQuery  = '';
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0) === (tab === 'cmc'));
  });
  document.getElementById('cmc-list').classList.toggle('hidden', tab !== 'cmc');
  document.getElementById('yahoo-list').classList.toggle('hidden', tab !== 'yahoo');
  document.querySelector('.pagination').style.display = tab === 'cmc' ? '' : 'none';

  if (tab === 'cmc') {
    state.cmcPage = 1;
    loadCmcPage();
  } else {
    document.getElementById('yahoo-list').innerHTML =
      '<div class="empty-hint" style="padding:20px 0;text-align:center;color:var(--muted)">Escribe para buscar activos de Yahoo Finance</div>';
  }
}

// ================================================================
// CMC
// ================================================================
async function loadCmcPage() {
  const q    = state.cmcQuery;
  const page = state.cmcPage;
  try {
    const data = await apiFetch(`/api/cmc/coins?q=${encodeURIComponent(q)}&page=${page}&limit=50`);
    state.cmcTotal = data.total;
    state.cmcPages = data.pages;
    renderCmcList(data.results);
    updatePagination();
  } catch (e) {
    document.getElementById('cmc-list').innerHTML =
      `<div class="empty-hint">Error: ${e.message}</div>`;
  }
}

function renderCmcList(coins) {
  const list = document.getElementById('cmc-list');
  if (!coins.length) {
    list.innerHTML = '<div class="empty-hint">Sin resultados</div>';
    return;
  }
  list.innerHTML = coins.map(c => `
    <div class="asset-item" draggable="true"
         data-type="cmc" data-symbol="${esc(c.symbol)}" data-name="${esc(c.name)}" data-rank="${c.rank || ''}">
      <span class="rank">#${c.rank || '?'}</span>
      <span class="symbol">${esc(c.symbol)}</span>
      <span class="name">${esc(c.name)}</span>
    </div>`).join('');
  attachSourceDragEvents(list);
}

// ================================================================
// Yahoo
// ================================================================
async function searchYahoo(q) {
  const list = document.getElementById('yahoo-list');
  if (!q) {
    list.innerHTML = '<div class="empty-hint" style="padding:20px 0;text-align:center;color:var(--muted)">Escribe para buscar activos de Yahoo Finance</div>';
    return;
  }
  list.innerHTML = '<div class="empty-hint">Buscando...</div>';
  try {
    const data = await apiFetch(`/api/yahoo/search?q=${encodeURIComponent(q)}`);
    if (!data.results?.length) {
      list.innerHTML = '<div class="empty-hint">Sin resultados</div>';
      return;
    }
    list.innerHTML = data.results.map(r => `
      <div class="asset-item" draggable="true"
           data-type="yahoo" data-ticker="${esc(r.ticker)}" data-name="${esc(r.name)}" data-ytype="${esc(r.type)}">
        <span class="symbol" style="width:60px">${esc(r.ticker)}</span>
        <span class="name">${esc(r.name)}</span>
        <span class="type-badge">${esc(r.type)}</span>
      </div>`).join('');
    attachSourceDragEvents(list);
  } catch (e) {
    list.innerHTML = `<div class="empty-hint">Error: ${e.message}</div>`;
  }
}

// ================================================================
// Search debounce
// ================================================================
function onSearch(val) {
  clearTimeout(state.searchTimer);
  state.searchTimer = setTimeout(() => {
    if (state.activeTab === 'cmc') {
      state.cmcQuery = val.trim();
      state.cmcPage  = 1;
      loadCmcPage();
    } else {
      searchYahoo(val.trim());
    }
  }, 300);
}

function updatePagination() {
  const info = document.getElementById('page-info');
  info.textContent = state.cmcPages > 0
    ? `${state.cmcPage} / ${state.cmcPages}`
    : '—';
  document.getElementById('prev-btn').disabled = state.cmcPage <= 1;
  document.getElementById('next-btn').disabled = state.cmcPage >= state.cmcPages;
}

function changePage(delta) {
  state.cmcPage = Math.max(1, Math.min(state.cmcPages, state.cmcPage + delta));
  loadCmcPage();
}

// ================================================================
// Altcoins render
// ================================================================
function renderAltcoins() {
  const area = document.getElementById('altcoin-drop');
  const items = state.altcoins.map((a, i) => buildAltItem(a, i)).join('');
  area.innerHTML = items || '<div class="empty-hint">Arrastra cryptos aquí</div>';
  area.querySelectorAll('.remove-btn').forEach(btn => {
    btn.onclick = () => removeAltcoin(btn.dataset.idx);
  });
}

function buildAltItem(a, i) {
  return `<div class="asset-item" data-idx="${i}" data-symbol="${esc(a.symbol)}">
    <span class="rank">${a.rank ? '#' + a.rank : ''}</span>
    <span class="symbol">${esc(a.symbol)}</span>
    <span class="name">${esc(a.name)}</span>
    <button class="remove-btn" data-idx="${i}">×</button>
  </div>`;
}

function removeAltcoin(idx) {
  state.altcoins.splice(parseInt(idx), 1);
  renderAltcoins();
  reinitAltSort();
}

// ================================================================
// Chart slots render
// ================================================================
function renderChartSlots() {
  const wrap = document.getElementById('chart-slots-wrap');
  wrap.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const block = state.chartBlocks[i];
    const el = block ? buildChartSlot(block, i) : buildEmptySlot(i);
    wrap.appendChild(el);
  }
}

function buildChartSlot(block, i) {
  const div = document.createElement('div');
  div.className = 'chart-slot';
  div.dataset.idx = i;
  const statusClass = block._status === 'ok' ? 'ok' : block._status === 'loading' ? 'loading' : 'error';
  const statusIcon  = block._status === 'ok' ? '✓' : block._status === 'loading' ? '◌' : '✗';
  div.innerHTML = `
    <span class="slot-num">${i + 1}</span>
    <span class="slot-symbol">${esc(block.cmc_symbol || block.ticker)}</span>
    <input class="slot-label-input" value="${esc(block.label)}" placeholder="Label"
           onchange="updateBlockLabel(${i}, this.value)">
    <select class="period-select" onchange="updateBlockPeriod(${i}, this.value)">
      <option value="7d"  ${block.period === '7d'  ? 'selected' : ''}>7d</option>
      <option value="1mo" ${block.period === '1mo' ? 'selected' : ''}>1mo</option>
    </select>
    <span class="slot-status ${statusClass}">${statusIcon}</span>
    <button class="remove-btn" onclick="removeChartBlock(${i})">×</button>`;
  return div;
}

function buildEmptySlot(i) {
  const div = document.createElement('div');
  div.className = 'chart-slot-empty';
  div.dataset.emptyIdx = i;
  div.innerHTML = `<span class="slot-num">${i + 1}</span><span style="color:var(--muted);font-size:12px">+ Arrastra un activo aquí</span>`;
  return div;
}

function updateBlockLabel(idx, val) {
  if (state.chartBlocks[idx]) state.chartBlocks[idx].label = val;
}

function updateBlockPeriod(idx, val) {
  if (state.chartBlocks[idx]) {
    state.chartBlocks[idx].period = val;
    // Re-validar con el nuevo período
    validateChartBlock(idx);
  }
}

function removeChartBlock(idx) {
  state.chartBlocks.splice(idx, 1);
  renderChartSlots();
}

// ================================================================
// Drag & Drop con SortableJS
// ================================================================
let _altSort = null;

function initSortables() {
  // Rejilla altcoins: acepta drops de CMC, sortable internamente
  _altSort = Sortable.create(document.getElementById('altcoin-drop'), {
    group:     { name: 'altcoins', put: (to, from, el) => el.dataset.type === 'cmc' },
    animation: 150,
    onAdd:     evt => handleAltDrop(evt),
    onUpdate:  evt => reorderAltcoins(evt),
    onEnd:     () => renderAltcoins() && reinitAltSort(),
  });

  reinitChartSort();
}

function reinitAltSort() {
  const area = document.getElementById('altcoin-drop');
  if (_altSort) { try { _altSort.destroy(); } catch(e) {} }
  _altSort = Sortable.create(area, {
    group:     { name: 'altcoins', put: (to, from, el) => el.dataset.type === 'cmc' },
    animation: 150,
    onAdd:     evt => handleAltDrop(evt),
    onEnd:     () => { syncAltcoinsFromDOM(); renderAltcoins(); reinitAltSort(); },
  });
}

function reinitChartSort() {
  // Los slots no usan SortableJS — son posiciones fijas con drag manual
  attachChartDropZones();
}

// Native drop handler for altcoin-drop (accepts HTML5 drag from CMC/Yahoo lists)
function attachAltNativeDrop() {
  const area = document.getElementById('altcoin-drop');
  area.addEventListener('dragover', e => {
    if (e.dataTransfer.types.includes('application/json')) {
      e.preventDefault();
      area.classList.add('drag-over');
    }
  });
  area.addEventListener('dragleave', e => {
    if (!area.contains(e.relatedTarget)) area.classList.remove('drag-over');
  });
  area.addEventListener('drop', e => {
    e.preventDefault();
    area.classList.remove('drag-over');
    const raw = e.dataTransfer.getData('application/json');
    if (!raw) return;
    try {
      const d = JSON.parse(raw);
      if (d.type !== 'cmc') return;
      const symbol = d.symbol;
      if (!symbol) return;
      if (state.altcoins.some(a => a.symbol === symbol)) {
        toast(`${symbol} ya está en la lista`, 'info');
        return;
      }
      state.altcoins.push({ symbol, name: d.name || symbol, rank: d.rank ? parseInt(d.rank) : null });
      renderAltcoins();
      reinitAltSort();
    } catch (err) {}
  });
}

function attachSourceDragEvents(container) {
  container.querySelectorAll('.asset-item[draggable]').forEach(el => {
    el.addEventListener('dragstart', e => {
      e.dataTransfer.setData('application/json', JSON.stringify({
        type:    el.dataset.type,
        symbol:  el.dataset.symbol  || '',
        ticker:  el.dataset.ticker  || '',
        name:    el.dataset.name    || '',
        rank:    el.dataset.rank    || '',
        ytype:   el.dataset.ytype   || '',
      }));
    });
  });
}

function attachChartDropZones() {
  const wrap = document.getElementById('chart-slots-wrap');
  wrap.addEventListener('dragover', e => e.preventDefault());
  wrap.addEventListener('drop', e => {
    e.preventDefault();
    const raw = e.dataTransfer.getData('application/json');
    if (!raw) return;
    const item = JSON.parse(raw);

    // Detectar sobre qué slot cayó
    let target = e.target.closest('[data-idx],[data-empty-idx]');
    if (!target) return;
    const idx = parseInt(target.dataset.idx ?? target.dataset.emptyIdx);
    if (isNaN(idx) || idx < 0 || idx > 5) return;

    if (state.chartBlocks.length >= 6 && idx >= state.chartBlocks.length) return;

    addToChartBlock(item, idx);
  });
}

function handleAltDrop(evt) {
  const el = evt.item;
  const symbol = el.dataset.symbol;
  if (!symbol) { el.remove(); return; }
  if (state.altcoins.some(a => a.symbol === symbol)) {
    toast(`${symbol} ya está en la lista`, 'info');
    el.remove();
    return;
  }
  syncAltcoinsFromDOM();
  renderAltcoins();
  reinitAltSort();
}

function syncAltcoinsFromDOM() {
  const area = document.getElementById('altcoin-drop');
  const items = area.querySelectorAll('.asset-item[data-symbol]');
  const symbols = Array.from(items).map(el => el.dataset.symbol).filter(Boolean);
  // Merge preservando nombres/ranks ya conocidos
  const map = Object.fromEntries(state.altcoins.map(a => [a.symbol, a]));
  state.altcoins = symbols.map(s => map[s] || { symbol: s, name: s, rank: null });
}

function reorderAltcoins(evt) {
  syncAltcoinsFromDOM();
}

// ================================================================
// Añadir a chart blocks
// ================================================================
async function addToChartBlock(item, idx) {
  if (state.chartBlocks.length >= 6 && idx >= state.chartBlocks.length) {
    toast('Máximo 6 bloques de gráfico', 'error');
    return;
  }

  let ticker, cmcSymbol, label, format;

  if (item.type === 'cmc') {
    ticker    = item.symbol + '-USD';
    cmcSymbol = item.symbol;
    label     = item.symbol;
    format    = 'crypto';
  } else {
    ticker    = item.ticker;
    cmcSymbol = null;
    label     = item.ticker;
    format    = guessFormat(item.ticker, item.ytype);
  }

  // Bloque temporal con estado loading
  const block = { label, ticker, period: '7d', cmc_symbol: cmcSymbol, format, _status: 'loading' };
  state.chartBlocks[idx] = block;
  renderChartSlots();
  toast(`Validando ${ticker}...`, 'info');

  // Validar con Yahoo Finance
  try {
    const period = block.period;
    const res = await apiFetch('/api/yahoo/validate', {
      method: 'POST',
      body: JSON.stringify({ ticker, period }),
    });
    if (res.valid) {
      block._status = 'ok';
      // Para futuros con /oz, sugerir commodity period
      if (ticker.endsWith('=F')) block.period = '1mo';
      toast(`${ticker} validado ✓`, 'success');
    } else {
      state.chartBlocks.splice(idx, 1);
      toast(`${ticker}: sin datos históricos — solo disponible en la rejilla de altcoins`, 'error');
    }
  } catch (e) {
    state.chartBlocks.splice(idx, 1);
    toast(`Error validando ${ticker}: ${e.message}`, 'error');
  }
  renderChartSlots();
}

async function validateChartBlock(idx) {
  const block = state.chartBlocks[idx];
  if (!block) return;
  block._status = 'loading';
  renderChartSlots();
  try {
    const res = await apiFetch('/api/yahoo/validate', {
      method: 'POST',
      body: JSON.stringify({ ticker: block.ticker, period: block.period }),
    });
    block._status = res.valid ? 'ok' : 'error';
  } catch (e) {
    block._status = 'error';
  }
  renderChartSlots();
}

function guessFormat(ticker, ytype) {
  if (ticker.endsWith('=F')) return 'commodity';
  if (ticker.startsWith('^')) {
    return ticker === '^IBEX' ? 'index_int' : 'index';
  }
  if (ticker.endsWith('-USD')) return 'crypto';
  return 'crypto';
}

// ================================================================
// Settings helpers
// ================================================================
function toggleKey() {
  const input = document.getElementById('s-apikey');
  input.type = input.type === 'password' ? 'text' : 'password';
}

async function detectCity() {
  if (!navigator.geolocation) {
    toast('Geolocalización no disponible en este navegador', 'error');
    return;
  }
  toast('Obteniendo ubicación...', 'info');
  navigator.geolocation.getCurrentPosition(
    async pos => {
      try {
        const data = await apiFetch(
          `/api/location?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`
        );
        if (data.city) {
          setVal('s-city', data.city);
          toast(`Ciudad detectada: ${data.city}`, 'success');
        } else {
          toast('No se pudo determinar la ciudad', 'error');
        }
      } catch (e) {
        toast('Error en geolocalización: ' + e.message, 'error');
      }
    },
    err => {
      toast('Permiso de ubicación denegado — introduce la ciudad manualmente', 'error');
    }
  );
}

// ================================================================
// Utils
// ================================================================
async function apiFetch(url, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  const res = await fetch(url, { ...opts, headers });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || res.statusText);
  }
  return res.json();
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function getVal(id) { return document.getElementById(id)?.value ?? ''; }
function setVal(id, v) {
  const el = document.getElementById(id);
  if (el) el.value = v;
}
function setStatus(msg) { document.getElementById('status-msg').textContent = msg; }

let _toastTimer;
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent  = msg;
  el.className    = `show ${type}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = type; }, 3500);
}
</script>
